name: Public Portal Search

on:
  schedule:
    # 8 AM CST (14:00 UTC) — daily
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      city:
        description: City to search
        default: Richardson
        type: string
      state:
        description: State code
        default: TX
        type: string
      beds:
        description: Minimum bedrooms
        default: "3"
        type: string
      baths:
        description: Minimum bathrooms
        default: "2"
        type: string

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install chromium

      - name: Run public search
        id: search
        env:
          RENTREADY_LANDING: ${{ runner.temp }}/bronze_landing
        run: |
          python -m src.ingestion.public_search \
            --city "${{ inputs.city || 'Richardson' }}" \
            --state "${{ inputs.state || 'TX' }}" \
            --beds "${{ inputs.beds || '3' }}" \
            --baths "${{ inputs.baths || '2' }}" \
            --repo-path ./data

          count=$(ls "$RENTREADY_LANDING"/*.jsonl 2>/dev/null | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Upload listings artifact
        uses: actions/upload-artifact@v4
        with:
          name: listings-${{ github.run_id }}
          path: ${{ runner.temp }}/bronze_landing/*.jsonl
          retention-days: 7

      - name: Push to Databricks UC volume (bronze landing)
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HOST: https://dbc-64a7e3a8-a95d.cloud.databricks.com
        run: |
          # Install and configure Databricks CLI
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          cat > ~/.databrickscfg <<EOF
          [DEFAULT]
          host = $DATABRICKS_HOST
          token = $DATABRICKS_TOKEN
          EOF
          for f in "$RENTREADY_LANDING"/*.jsonl; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            databricks fs cp --overwrite "$f" "dbfs:/Volumes/gjhinc/ingestion/bronze_landing/$name"
            echo "Uploaded $name to UC volume"
          done

      - name: Commit results to repo
        run: |
          git config user.name "rentready-bot"
          git config user.email "bot@rentready.ai"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily public search: ${{ inputs.city || 'Richardson' }}, ${{ inputs.state || 'TX' }} ($(date +%Y-%m-%d))"
            git push
          fi

      - name: Write GitHub summary
        run: |
          echo "## Public Search Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **City:** ${{ inputs.city || 'Richardson' }}, ${{ inputs.state || 'TX' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Criteria:** ${{ inputs.beds || '3' }} bed / ${{ inputs.baths || '2' }} bath" >> $GITHUB_STEP_SUMMARY
          echo "- **Files written:** ${{ steps.search.outputs.count }}" >> $GITHUB_STEP_SUMMARY
