resources:
  jobs:
    rentready_ingest_and_screen:
      name: rentready_ingest_and_screen
      schedule:
        quartz_cron_expression: "0 0 */2 * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED

      tasks:
        - task_key: ingest
          new_cluster:
            num_workers: 0
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
          spark_python_task:
            python_file: /Workspace/Shared/rentready/src/ingestion/reso_ingest.py

        - task_key: pipeline
          depends_on:
            - task_key: ingest
          pipeline_task:
            pipeline_id: ${resources.pipelines.rentready_pipeline.pipeline_id}

        - task_key: rank
          depends_on:
            - task_key: pipeline
          new_cluster:
            num_workers: 0
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
          spark_python_task:
            python_file: /Workspace/Shared/rentready/src/ml/ranking.py

      queue:
        enabled: true
