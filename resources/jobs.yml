resources:
  jobs:
    rentready_ingest_and_screen:
      name: rentready_ingest_and_screen
      schedule:
        quartz_cron_expression: "0 0 */2 * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED

      # Serverless environment (required by serverless-only workspaces).
      # Created via the REST API because bundle schema v1.5.0 doesn't
      # expose the `environments` / `environment_key` fields yet.
      # Pipeline created via bundle deploy:
      #   databricks bundle deploy -t dev -p "george@gjh-inc.com" --select rentready_pipeline
      # Job created via API:
      #   POST /api/2.2/jobs/create

      tasks:
        - task_key: ingest
          environment_key: serverless_env
          spark_python_task:
            python_file: /Workspace/Users/george@gjh-inc.com/.bundle/rentready/dev/files/src/ingestion/reso_ingest.py

        - task_key: pipeline
          depends_on:
            - task_key: ingest
          pipeline_task:
            pipeline_id: "017e646f-31fa-45cb-a224-de816431b4fe"

        - task_key: rank
          depends_on:
            - task_key: pipeline
          environment_key: serverless_env
          spark_python_task:
            python_file: /Workspace/Users/george@gjh-inc.com/.bundle/rentready/dev/files/src/ml/ranking.py

      queue:
        enabled: true
